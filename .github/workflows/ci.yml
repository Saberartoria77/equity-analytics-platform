name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equity_analytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_URL: postgresql://postgres:postgres@localhost:5432/equity_analytics_test
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: python -m pytest -v
      - name: Compile
        run: python -m compileall -q .
      - name: Apply schema twice to verify idempotency
        run: |
          psql --set=ON_ERROR_STOP=1 -h localhost -U postgres -d equity_analytics_test -f schema.sql
          psql --set=ON_ERROR_STOP=1 -h localhost -U postgres -d equity_analytics_test -f schema.sql
      - name: Upgrade representative legacy schema twice
        run: |
          createdb -h localhost -U postgres equity_analytics_legacy_test
          psql --set=ON_ERROR_STOP=1 -h localhost -U postgres -d equity_analytics_legacy_test -f tests/fixtures/legacy_schema.sql
          psql --set=ON_ERROR_STOP=1 -h localhost -U postgres -d equity_analytics_legacy_test -f schema.sql
          psql --set=ON_ERROR_STOP=1 -h localhost -U postgres -d equity_analytics_legacy_test -f schema.sql
