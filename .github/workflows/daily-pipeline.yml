name: Daily market-data pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1-5"

permissions:
  contents: read

concurrency:
  group: daily-market-data-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DB_URL: ${{ secrets.DB_URL }}
      ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
      MIN_INGEST_SUCCESS_RATE: ${{ vars.MIN_INGEST_SUCCESS_RATE || '0.8' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Validate required database secret
        run: test -n "$DB_URL"
      - name: Apply database schema
        run: psql "$DB_URL" -v ON_ERROR_STOP=1 -f schema.sql
      - name: Ingest corrected market data
        run: python ingest.py
      - name: Refresh indicators
        run: python indicators.py
